name: CI

on:
  push:
    branches: [main, initial-implementation]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # Runs unit tests only (excludes E2E tests).
      # E2E tests require OPENAI_API_KEY and make real API calls.
      # Run E2E tests locally with: npm run test:e2e
      - name: Test
        run: npm run test:run
